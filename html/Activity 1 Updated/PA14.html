<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Color Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Bootstrap Color Basics</h2>

    <div class="card mb-4">
        <div class="card-header">Text Color Classes</div>
        <div class="card-body">
            <p class="text-primary">text-primary</p>
            <p class="text-success">text-success </p>
            <p class="text-danger">text-danger </p>
            <p class="text-warning ">text-warning</p>
            <p class="text-info">text-info</p>
            <p class="text-muted">text-muted</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Background Color Classes</div>
        <div class="card-body">
            <div class="p-3 mb-2 bg-primary text-white">bg-primary with white text</div>
            <div class="p-3 mb-2 bg-secondary text-white">bg-secondary</div>
            <div class="p-3 mb-2 bg-success text-white">bg-success</div>
            <div class="p-3 mb-2 bg-danger text-white">bg-danger</div>
            <div class="p-3 mb-2 bg-warning text-dark">bg-warning (Yellow)</div>
            <div class="p-3 mb-2 bg-info text-dark">bg-info</div>
            <div class="p-3 mb-2 bg-dark text-white">bg-dark</div>
        </div>
    </div>
</div>

</body>
</html>
